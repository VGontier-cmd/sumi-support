name: Bug report
description: Something doesn't work as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

  - type: textarea
    id: what-happened
    attributes:
      label: What's happening?
      description: Describe the problem in a few lines.
      placeholder: e.g. "When I tap Daily quiz the screen stays blank"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Go to the Quiz tab
        3. Tap Daily quiz
        4. ...
    validations:
      required: false

  - type: input
    id: device
    attributes:
      label: Device
      placeholder: e.g. iPhone 13 Pro Max, iOS 18.1
    validations:
      required: false

  - type: input
    id: app-version
    attributes:
      label: App version
      description: Visible at the bottom of the in-app Settings screen.
      placeholder: e.g. 1.0.0
    validations:
      required: false

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: Drag and drop an image if you have one.
    validations:
      required: false
