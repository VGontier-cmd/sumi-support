name: Feedback / Suggestion
description: An idea, constructive criticism, or general feedback on the experience
labels: ["feedback"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your feedback.

  - type: textarea
    id: feedback
    attributes:
      label: Your feedback
      placeholder: e.g. "I'd like to filter achievements by category"
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - Suggestion (new idea)
        - Improvement (on an existing feature)
        - UX criticism (something that frustrated me)
        - Compliment (those are welcome too!)
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Optional — where in the app, or for what use case?
    validations:
      required: false
