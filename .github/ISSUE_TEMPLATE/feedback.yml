name: Feedback / Suggestion
description: Une idée, une critique constructive, un retour sur l'expérience
labels: ["feedback"]
body:
  - type: markdown
    attributes:
      value: |
        Merci pour ton retour ! / Thanks for your feedback.

  - type: textarea
    id: feedback
    attributes:
      label: Ton retour / Your feedback
      placeholder: ex. "J'aimerais pouvoir filtrer les achievements par catégorie"
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - Suggestion (nouvelle idée)
        - Amélioration (sur une fonctionnalité existante)
        - Critique UX (quelque chose qui m'a frustré)
        - Compliment (tu peux aussi !)
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Contexte
      description: Optionnel — où dans l'app, ou pour quel cas d'usage ?
    validations:
      required: false
